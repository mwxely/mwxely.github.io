{% include base_path %}

<div class="masthead">
  <div class="masthead__inner-wrap">
    <div class="masthead__menu">
      <nav id="site-nav" class="greedy-nav">
        <button><div class="navicon"></div></button>
        <ul class="visible-links">
          <li class="masthead__menu-item masthead__menu-item--lg"><a href="{{ base_path }}/">{{ site.title }}</a></li>
          {% for link in site.data.navigation.main %}
            {% if link.url contains 'http' %}
              {% assign domain = '' %}
              {% else %}
              {% assign domain = base_path %}
            {% endif %}
            <li class="masthead__menu-item"><a href="{{ domain }}{{ link.url }}">{{ link.title }}</a></li>
          {% endfor %}
          <!-- Theme toggle -->
          <li class="masthead__menu-item">
            <a id="theme-toggle" style="cursor:pointer;" onclick="var d=document.documentElement,isDark=d.getAttribute('data-theme')==='dark',c=isDark?'light':'dark';localStorage.setItem('theme',c);if(c==='dark'){d.setAttribute('data-theme','dark')}else{d.removeAttribute('data-theme')};var i=document.getElementById('theme-icon');if(i)i.className='fas fa-'+(c==='dark'?'moon':'sun')">
              <i id="theme-icon" class="fas fa-sun"></i>
            </a>
          </li>
        </ul>
        <ul class="hidden-links hidden"></ul>
      </nav>
    </div>
  </div>
</div>
